naftiko: 1.0.0-alpha2
info:
  label: Platzi Fake Store API — Auth
  description: 'Platzi Fake Store API — Auth. 3 operations. Lead operation: Login and obtain JWT tokens. Self-contained Naftiko
    capability covering one Platzi Fake Store Api business surface.'
  tags:
  - Platzi Fake Store Api
  - Auth
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PLATZI_FAKE_STORE_API_API_KEY: PLATZI_FAKE_STORE_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: platzi-fake-store-auth
    baseUri: https://api.escuelajs.co/api/v1
    description: Platzi Fake Store API — Auth business capability. Self-contained, no shared references.
    resources:
    - name: auth-login
      path: /auth/login
      operations:
      - name: login
        method: POST
        description: Login and obtain JWT tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: auth-profile
      path: /auth/profile
      operations:
      - name: getprofile
        method: GET
        description: Get authenticated user profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: auth-refresh-token
      path: /auth/refresh-token
      operations:
      - name: refreshtoken
        method: POST
        description: Refresh access token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PLATZI_FAKE_STORE_API_API_KEY}}'
  exposes:
  - type: rest
    namespace: platzi-fake-store-auth-rest
    port: 8080
    description: REST adapter for Platzi Fake Store API — Auth. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/auth/login
      name: auth-login
      description: REST surface for auth-login.
      operations:
      - method: POST
        name: login
        description: Login and obtain JWT tokens
        call: platzi-fake-store-auth.login
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/profile
      name: auth-profile
      description: REST surface for auth-profile.
      operations:
      - method: GET
        name: getprofile
        description: Get authenticated user profile
        call: platzi-fake-store-auth.getprofile
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/refresh-token
      name: auth-refresh-token
      description: REST surface for auth-refresh-token.
      operations:
      - method: POST
        name: refreshtoken
        description: Refresh access token
        call: platzi-fake-store-auth.refreshtoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platzi-fake-store-auth-mcp
    port: 9090
    transport: http
    description: MCP adapter for Platzi Fake Store API — Auth. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: login-and-obtain-jwt-tokens
      description: Login and obtain JWT tokens
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platzi-fake-store-auth.login
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-authenticated-user-profile
      description: Get authenticated user profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platzi-fake-store-auth.getprofile
      outputParameters:
      - type: object
        mapping: $.
    - name: refresh-access-token
      description: Refresh access token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platzi-fake-store-auth.refreshtoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
