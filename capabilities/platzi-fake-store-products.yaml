    baseUri: https://api.escuelajs.co/api/v1
    description: Platzi Fake Store API — Products business capability. Self-contained, no shared references.
    resources:
    - name: products
      path: /products
      operations:
      - name: listproducts
        method: GET
        description: List products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: title
          in: query
          type: string
        - name: price
          in: query
          type: number
        - name: price_min
          in: query
          type: number
        - name: price_max
          in: query
          type: number
        - name: categoryId
          in: query
          type: integer
      - name: createproduct
        method: POST
        description: Create product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: products-slug-slug
      path: /products/slug/{slug}
      operations:
      - name: getproductbyslug
        method: GET
        description: Get product by slug
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-slug-slug-related
      path: /products/slug/{slug}/related
      operations:
      - name: getrelatedproductsbyslug
        method: GET
        description: Get related products by slug
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-id
      path: /products/{id}
      operations:
      - name: getproduct
        method: GET
        description: Get product by id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateproduct
        method: PUT
        description: Update product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteproduct
        method: DELETE
        description: Delete product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-id-related
      path: /products/{id}/related
      operations:
      - name: getrelatedproducts
        method: GET
        description: Get related products by id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
