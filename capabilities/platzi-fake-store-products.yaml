      operations:
      - method: GET
        name: getrelatedproductsbyslug
        description: Get related products by slug
        call: platzi-fake-store-products.getrelatedproductsbyslug
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{id}
